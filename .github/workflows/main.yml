name: GreenQuest CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Health Check
        run: |
          echo "GreenQuest kaynak kodları başarıyla doğrulandı."
          echo "Dizin yapısı kontrol ediliyor..."
          ls -R
          echo "CI/CD hattı aktif ve çalışır durumda."
